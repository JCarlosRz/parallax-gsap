<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cuenta · DigiCodes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#1a2331;--primary:#6c5ce7;--primary-2:#a29bfe;--wa:#25d366;--text:#e6edf3;--muted:#9aa7b8;--border:#243040;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px;min-height:100vh}
.wrap{max-width:460px;margin:6vh auto}
a{color:var(--primary-2)}
.btn{border:none;cursor:pointer;border-radius:10px;padding:12px 18px;font-weight:600;font-family:inherit;font-size:.95rem;color:#fff;transition:.2s;width:100%}
.btn:hover{filter:brightness(1.1)}
.btn--primary{background:linear-gradient(135deg,var(--primary),var(--primary-2))}
.btn--green{background:var(--wa)}
.btn--ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:disabled{opacity:.5;cursor:not-allowed}
input{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--border);background:#0f1620;color:var(--text);font-family:inherit;font-size:.95rem;margin-bottom:12px}
label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px}
.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px}
.brand__logo{width:46px;height:46px;border-radius:12px;overflow:hidden;background:#000}
.brand__logo img{width:100%;height:100%;object-fit:cover}
.brand__name{font-weight:800;font-size:1.4rem}
.brand__name span{color:var(--primary-2)}
h1{font-size:1.2rem;text-align:center;margin-bottom:4px}
.sub{color:var(--muted);font-size:.9rem;text-align:center;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;background:#0f1620;border:1px solid var(--border);cursor:pointer;font-weight:600;color:var(--muted)}
.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}
.msg{font-size:.85rem;min-height:20px;margin:6px 0 10px;text-align:center}
.msg.err{color:#e17055}
.msg.ok{color:#25d366}
.hidden{display:none}
.link{text-align:center;margin-top:14px;font-size:.9rem}
.link a{cursor:pointer}
/* Panel usuario */
.userbox{text-align:center}
.userbox .email{font-weight:600;color:var(--primary-2);word-break:break-all}
.pill{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.78rem;font-weight:600;margin:8px 0}
.pill.ok{background:rgba(37,211,102,.15);color:#25d366}
.pill.warn{background:rgba(225,112,85,.15);color:#e17055}
.order{background:#0f1620;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;text-align:left;font-size:.9rem;cursor:pointer;transition:.2s}
.order:hover{border-color:var(--primary-2);background:#131c2a}
.order strong{color:var(--primary-2)}
.order .ver-mas{display:block;margin-top:6px;color:var(--primary-2);font-size:.78rem;font-weight:600}
.hr{border:none;border-top:1px solid var(--border);margin:18px 0}

/* Modal factura */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:center;padding:20px;overflow:auto;z-index:999}
.modal.open{display:flex}
.modal-close{position:fixed;top:16px;right:20px;background:#fff;color:#111;border:none;width:42px;height:42px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:1001;font-weight:700}

/* Factura imprimible (igual que el panel) */
.invoice-print{position:relative;background:#fff;color:#111;border-radius:12px;padding:34px;max-width:640px;width:100%;margin:0 auto;overflow:hidden}
.invoice-print::before{content:'';position:absolute;inset:0;background:url('logo.png.jpg') center center/85% auto no-repeat;opacity:.05;pointer-events:none;z-index:0}
.invoice-print > *{position:relative;z-index:1}
.invoice-print .ip-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #eee;padding-bottom:16px;margin-bottom:16px}
.invoice-print .ip-brand{display:flex;align-items:center;gap:10px}
.invoice-print .ip-logo{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.invoice-print .ip-logo img{width:100%;height:100%;object-fit:cover}
.invoice-print h3{font-size:1.3rem;color:#111}
.invoice-print .ip-meta{text-align:right;font-size:.85rem;color:#555}
.invoice-print table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.9rem}
.invoice-print th,.invoice-print td{border-bottom:1px solid #eee;color:#111;text-align:left;padding:10px}
.invoice-print .ip-total{text-align:right;font-size:1.4rem;font-weight:800;margin-top:10px;color:#111}
.invoice-print .ip-foot{margin-top:20px;text-align:center;color:#555;font-size:.85rem;border-top:1px dashed #ddd;padding-top:14px}
.invoice-print .ip-pay-btn{display:inline-block;margin-top:14px;background:#6c5ce7;color:#fff!important;text-decoration:none;padding:12px 22px;border-radius:10px;font-weight:700}

@media print{
  @page{margin:0}
  body{background:#fff;padding:0}
  .no-print{display:none!important}
  .modal{position:static;background:#fff;padding:0;display:block!important}
  .modal-close{display:none!important}
  .invoice-print{box-shadow:none;margin:0;max-width:100%;min-height:100vh;padding:40px}
  .invoice-print::before{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="brand__logo"><img src="logo.png.jpg" alt="DigiCodes"></span><span class="brand__name">Digi<span>Codes</span></span></div>

  <!-- AUTH -->
  <div class="card" id="authCard">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</div>
      <div class="tab" id="tabReg" onclick="switchTab('reg')">Crear cuenta</div>
    </div>

    <!-- LOGIN -->
    <div id="formLogin">
      <label>Correo</label>
      <input id="lEmail" type="email" placeholder="tucorreo@gmail.com" autocomplete="email">
      <label>Contraseña</label>
      <input id="lPass" type="password" placeholder="••••••••" autocomplete="current-password">
      <div class="msg" id="lMsg"></div>
      <button class="btn btn--primary" onclick="doLogin()">Entrar</button>
      <div class="link"><a onclick="doReset()">¿Olvidaste tu contraseña?</a></div>
    </div>

    <!-- REGISTRO -->
    <div id="formReg" class="hidden">
      <label>Nombre</label>
      <input id="rName" type="text" placeholder="Tu nombre">
      <label>Correo</label>
      <input id="rEmail" type="email" placeholder="tucorreo@gmail.com" autocomplete="email">
      <label>Contraseña (mín. 6 caracteres)</label>
      <input id="rPass" type="password" placeholder="••••••••" autocomplete="new-password">
      <div class="msg" id="rMsg"></div>
      <button class="btn btn--green" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>

  <!-- USUARIO LOGUEADO -->
  <div class="card hidden userbox" id="userCard">
    <h1>Hola 👋</h1>
    <p class="email" id="uEmail"></p>
    <div id="verifyZone"></div>
    <hr class="hr">
    <h1 style="text-align:left;font-size:1.05rem">Mis pedidos</h1>
    <p class="sub" style="text-align:left" id="ordersHint">Cargando...</p>
    <div id="ordersList"></div>
    <hr class="hr">
    <a href="index.html" class="btn btn--ghost" style="display:block;text-align:center;text-decoration:none;margin-bottom:10px">🛒 Ir a la tienda</a>
    <button class="btn btn--ghost" onclick="doLogout()">Cerrar sesión</button>
  </div>

  <div class="link"><a href="index.html">← Volver a la tienda</a></div>
</div>

<!-- MODAL FACTURA -->
<div class="modal" id="invoiceModal">
  <button class="modal-close no-print" onclick="cerrarFactura()">✕</button>
  <div style="max-width:640px;width:100%">
    <div id="invoiceArea"></div>
    <div class="no-print" style="text-align:center;margin:14px 0 30px">
      <button class="btn btn--primary" style="max-width:280px;margin:0 auto" onclick="window.print()">🖨 Imprimir / Guardar PDF</button>
    </div>
  </div>
</div>

<!-- Firebase (versión modular por CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  sendEmailVerification, signOut, onAuthStateChanged, sendPasswordResetEmail,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBS3YfwpFyDmOf9Gl-niGGVkZTBp1zR_R0",
  authDomain: "digicodes-web.firebaseapp.com",
  projectId: "digicodes-web",
  storageBucket: "digicodes-web.firebasestorage.app",
  messagingSenderId: "32063045523",
  appId: "1:32063045523:web:2f72001e824a3a85cff266",
  measurementId: "G-L9TDYN2LQ1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Helpers UI
const $ = id => document.getElementById(id);
window.switchTab = t => {
  const login = t === 'login';
  $('tabLogin').classList.toggle('active', login);
  $('tabReg').classList.toggle('active', !login);
  $('formLogin').classList.toggle('hidden', !login);
  $('formReg').classList.toggle('hidden', login);
};

function friendlyError(e){
  const c = e.code || '';
  if(c.includes('invalid-credential') || c.includes('wrong-password') || c.includes('user-not-found')) return 'Correo o contraseña incorrectos.';
  if(c.includes('email-already-in-use')) return 'Ese correo ya está registrado. Inicia sesión.';
  if(c.includes('invalid-email')) return 'El correo no es válido.';
  if(c.includes('weak-password')) return 'La contraseña debe tener al menos 6 caracteres.';
  if(c.includes('too-many-requests')) return 'Demasiados intentos. Espera un momento.';
  return 'Ocurrió un error. Intenta de nuevo.';
}

// REGISTRO
window.doRegister = async () => {
  const name = $('rName').value.trim();
  const email = $('rEmail').value.trim();
  const pass = $('rPass').value;
  const msg = $('rMsg'); msg.textContent=''; msg.className='msg';
  if(!name){ msg.textContent='Escribe tu nombre.'; msg.classList.add('err'); return; }
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    if(name) await updateProfile(cred.user, { displayName: name });
    await sendEmailVerification(cred.user);
    msg.textContent = '✅ Cuenta creada. Te enviamos un correo de verificación.';
    msg.classList.add('ok');
  }catch(e){ msg.textContent = friendlyError(e); msg.classList.add('err'); }
};

// LOGIN
window.doLogin = async () => {
  const email = $('lEmail').value.trim();
  const pass = $('lPass').value;
  const msg = $('lMsg'); msg.textContent=''; msg.className='msg';
  try{
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){ msg.textContent = friendlyError(e); msg.classList.add('err'); }
};

// RESET PASSWORD
window.doReset = async () => {
  const email = $('lEmail').value.trim();
  const msg = $('lMsg'); msg.textContent=''; msg.className='msg';
  if(!email){ msg.textContent='Escribe tu correo arriba primero.'; msg.classList.add('err'); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    msg.textContent = '📧 Te enviamos un enlace para restablecer tu contraseña.';
    msg.classList.add('ok');
  }catch(e){ msg.textContent = friendlyError(e); msg.classList.add('err'); }
};

window.doLogout = () => signOut(auth);

window.resendVerify = async () => {
  try{ await sendEmailVerification(auth.currentUser); alert('📧 Correo de verificación reenviado.'); }
  catch(e){ alert('Error al reenviar. Intenta más tarde.'); }
};

// === FACTURA (igual que el panel) ===
window.verFactura = (o) => {
  const tilopayBtn = (o.tilopay && (o.metodo||'').includes('Tilopay'))
    ? `<div style="text-align:center"><a class="ip-pay-btn" href="${o.tilopay}" target="_blank" rel="noopener">💳 Pagar con Tilopay</a></div>`
    : '';
  const amountTxt = o.producto ? o.producto.split(' $').pop() : '';
  $('invoiceArea').innerHTML = `
    <div class="invoice-print" id="printable">
      <div class="ip-head">
        <div class="ip-brand"><span class="ip-logo"><img src="logo.png.jpg" alt="DigiCodes"></span>
          <div><h3>DigiCodes</h3><div style="font-size:.8rem;color:#555">Códigos digitales</div></div>
        </div>
        <div class="ip-meta">
          <div><strong>Factura #${o.factura||'-'}</strong></div>
          <div>${o.fechaTexto||''}</div>
          <div>WhatsApp: +503 7016 4013</div>
        </div>
      </div>
      <div style="font-size:.9rem;color:#333"><strong>Cliente:</strong> ${o.emailCliente||''}</div>
      <table>
        <thead><tr><th>Descripción</th><th>Total</th></tr></thead>
        <tbody><tr><td>${o.producto||'Pedido'}</td><td>$${o.total||'-'}</td></tr></tbody>
      </table>
      <div style="font-size:.9rem;color:#333">Método de pago: <strong>${o.metodo||'-'}</strong> · Estado: <strong style="color:#1a9e4b">${o.estado||'PAGADO'}</strong></div>
      <div class="ip-total">TOTAL: $${o.total||'-'} USD</div>
      ${tilopayBtn}
      <div class="ip-foot">¡Gracias por su compra! · DigiCodes</div>
    </div>`;
  $('invoiceModal').classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.cerrarFactura = () => {
  $('invoiceModal').classList.remove('open');
  document.body.style.overflow = '';
};

// Estado de sesión
onAuthStateChanged(auth, async user => {
  if(!user){
    $('authCard').classList.remove('hidden');
    $('userCard').classList.add('hidden');
    return;
  }
  $('authCard').classList.add('hidden');
  $('userCard').classList.remove('hidden');
  $('uEmail').textContent = user.email;

  // Verificación
  const vz = $('verifyZone');
  if(user.emailVerified){
    vz.innerHTML = '<span class="pill ok">✔ Correo verificado</span>';
  }else{
    vz.innerHTML = `<span class="pill warn">⚠ Correo sin verificar</span>
      <p class="sub">Revisa tu bandeja (y spam) y abre el enlace que te enviamos.</p>
      <button class="btn btn--ghost" onclick="resendVerify()">Reenviar correo de verificación</button>`;
  }

  // Cargar pedidos del usuario desde Firestore (por CORREO)
  const hint = $('ordersHint'), list = $('ordersList');
  try{
    const emailKey = (user.email || '').toLowerCase();
    const q = query(
      collection(db,'pedidos'),
      where('emailCliente','==',emailKey),
      orderBy('fecha','desc')
    );
    const snap = await getDocs(q);
    if(snap.empty){
      hint.textContent = 'Aún no tienes pedidos guardados.';
      list.innerHTML = '';
    }else{
      hint.textContent = `Tienes ${snap.size} pedido(s). Toca uno para ver la factura:`;
      list.innerHTML = snap.docs.map(d=>{
        const o = d.data();
        const safe = JSON.stringify(o).replace(/'/g,"&#39;");
        return `<div class="order" onclick='verFactura(${safe})'>
          <strong>${o.producto||'Pedido'}</strong> · $${o.total||'-'}<br>
          <span style="color:var(--muted);font-size:.82rem">✔ ${o.estado||'Pendiente'} · Factura #${o.factura||'-'} · ${o.fechaTexto||''}</span>
          <span class="ver-mas">📄 Ver factura →</span>
        </div>`;
      }).join('');
    }
  }catch(e){
    hint.textContent = 'No se pudieron cargar los pedidos (revisa reglas de Firestore).';
    console.error(e);
  }
});
</script>
</body>
</html>
