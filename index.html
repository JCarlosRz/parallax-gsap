<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax con GSAP + ScrollTrigger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <h1>Efecto Parallax</h1>
    <p>Haz scroll para ver la magia ✨</p>
  </header>

  <section class="panel">
    <div class="image-wrapper">
      <img src="https://picsum.photos/id/1015/1600/900" alt="Montañas" />
    </div>
    <h2>Montañas</h2>
  </section>

  <section class="panel">
    <div class="image-wrapper">
      <img src="https://picsum.photos/id/1043/1600/900" alt="Bosque" />
    </div>
    <h2>Bosque</h2>
  </section>

  <section class="panel">
    <div class="image-wrapper">
      <img src="https://picsum.photos/id/1039/1600/900" alt="Cascada" />
    </div>
    <h2>Cascada</h2>
  </section>

  <footer class="hero">
    <h1>Fin del viaje 🌄</h1>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
